repos:
  - repo: builtin
    hooks:
      - id: end-of-file-fixer
        exclude: "(^.yarn/)|(.svg$)"
      - id: trailing-whitespace
        exclude: "(^.yarn/)|(.svg$)"
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: check-json
  - repo: https://github.com/google/yamlfmt
    rev: v0.20.0
    hooks:
      - id: yamlfmt
        exclude: "^infra/helm"
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint
  - repo: https://github.com/crate-ci/typos
    rev: v1.45.0
    hooks:
      - id: typos
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        exclude: z-clients/java/gradlew
        args: ["--write", "-i", "4", "-ci"]
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck
  - repo: https://github.com/hyland/github-actions-ensure-sha-pinned-actions
    rev: 22ca7a8cf33e873ba1d6fbcd2b71fa0ec5006b17 # v1.1.0
    hooks:
      - id: gha-sha-convert
        args: ["--allowlist", "actions/*"]
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: f805888065fdb6162e1f800e50bb9460cbd223d6 # v0.37.2
    hooks:
      - id: check-dependabot
