version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    # allow doing version updates for github-actions dependabot bumps
    open-pull-requests-limit: 2
    cooldown:
      default-days: 3
    groups:
      workflows:
        applies-to: version-updates
        patterns:
          - '*'
    schedule:
      interval: "weekly"
      day: "wednesday"
